<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Doorbell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface2: #1e1e1e;
            --border: rgba(255,255,255,0.08);
            --text: #f0f0f0;
            --text-muted: #888;
            --accent: #3b82f6;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --btn-size: 52px;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
        }

        /* ── Full-screen video layout ── */
        #app {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            position: relative;
        }

        #video-wrapper {
            position: relative;
            flex: 1;
            background: #000;
            overflow: hidden;
        }

        #remoteVideo {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* ── Overlaid status badge (top-left) ── */
        #status-overlay {
            position: absolute;
            top: 14px;
            left: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 5px 11px 5px 8px;
            font-size: 12px;
            font-weight: 500;
            color: #fff;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        #connection_status {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #888;
            flex-shrink: 0;
            transition: background 0.4s;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
        }

        #connection_status.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
        #connection_status.amber  { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
        #connection_status.red    { background: var(--red);   box-shadow: 0 0 6px var(--red);   }

        /* ── Doorbell waiting / error notice (over video) ── */
        #video-notice {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.7);
            font-size: 15px;
            color: #ccc;
            text-align: center;
            padding: 24px;
        }

        #video-notice .notice-icon {
            font-size: 40px;
            margin-bottom: 4px;
        }

        #loadingDoorbell  { display: flex; }
        #errorConnectionDoorbell { display: none; color: #f87171; }

        /* ── Bottom controls bar ── */
        #controls-bar {
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 12px 16px calc(12px + var(--safe-bottom));
        }

        /* Primary row: main action buttons */
        .btn-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            transition: transform 0.12s, opacity 0.12s, background 0.2s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn:active { transform: scale(0.94); opacity: 0.85; }

        /* Icon-only circular buttons */
        .btn-icon {
            width: var(--btn-size);
            height: var(--btn-size);
            border-radius: 50%;
            font-size: 22px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-icon:hover { background: #2a2a2a; }

        .btn-icon.active {
            background: rgba(59,130,246,0.18);
            border-color: rgba(59,130,246,0.4);
            color: #93c5fd;
        }

        .btn-icon.danger-active {
            background: rgba(239,68,68,0.18);
            border-color: rgba(239,68,68,0.4);
            color: #fca5a5;
        }

        /* Talk button — circular, green glow */
        #talkButton {
            background: #16a34a;
            border: none;
            color: #fff;
            box-shadow: 0 0 12px rgba(34,197,94,0.55), 0 0 24px rgba(34,197,94,0.25);
        }
        #talkButton:hover { background: #15803d; }
        #talkButton.speaking {
            background: #b91c1c;
            box-shadow: 0 0 12px rgba(239,68,68,0.55), 0 0 24px rgba(239,68,68,0.25);
        }

        /* Open door button */
        #door-row {
            display: flex;
            justify-content: center;
            margin-top: 16px;
        }

        .btn-door {
            width: 117px;
            height: 117px;
            border-radius: 50%;
            background: rgba(59,130,246,0.18);
            border: 1px solid rgba(59,130,246,0.4);
            color: #93c5fd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.12s, opacity 0.12s;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .btn-door svg { width: 50px; height: 50px; }
        .btn-door:hover { background: rgba(59,130,246,0.28); }
        .btn-door:active { transform: scale(0.94); opacity: 0.85; }

        /* Secondary row */
        .btn-row-secondary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }


        /* Menu overlay — top right */
        #menu-overlay {
            position: absolute;
            top: 14px;
            right: 14px;
        }

        #menuButton {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #menuButton:hover { background: rgba(0,0,0,0.75); }

        #menu-dropdown {
            display: none;
            position: absolute;
            top: 44px;
            right: 0;
            background: rgba(20,20,20,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            min-width: 150px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }
        #menu-dropdown.open { display: block; }

        .menu-item {
            display: block;
            width: 100%;
            padding: 11px 16px;
            background: none;
            border: none;
            color: #f0f0f0;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            cursor: pointer;
            transition: background 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .menu-item:hover { background: rgba(255,255,255,0.08); }
        .menu-item.danger { color: #fca5a5; }
        .menu-item.danger:hover { background: rgba(239,68,68,0.15); }

        #wakeButton {
            margin-top: 14px;
            padding: 10px 22px;
            background: rgba(59,130,246,0.2);
            border: 1px solid rgba(59,130,246,0.45);
            border-radius: 22px;
            color: #93c5fd;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        #wakeButton:hover { background: rgba(59,130,246,0.32); }
        #wakeButton:disabled { opacity: 0.5; cursor: default; }

        /* Avatars overlay — bottom-left of video */
        #avatars-overlay {
            position: absolute;
            bottom: 14px;
            left: 14px;
            display: flex;
            align-items: flex-end;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 70%;
            pointer-events: none;
        }

        /* Self avatar — 57px (1.5× the 38px participant size) */
        #user-avatar {
            width: 57px;
            height: 57px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.25);
            flex-shrink: 0;
            transition: box-shadow 0.3s;
        }
        #user-avatar.speaking {
            box-shadow: 0 0 0 3px currentColor, 0 0 16px 4px currentColor;
        }

        /* Other participants */
        #participants-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: flex-end;
        }

        .participant-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            border: 2px solid rgba(255,255,255,0.15);
            transition: box-shadow 0.3s;
            flex-shrink: 0;
            position: relative;
        }
        .participant-avatar .participant-name {
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: rgba(255,255,255,0.75);
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* ── Door toast ── */
        #door-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.85);
            background: rgba(22, 163, 74, 0.95);
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            padding: 20px 36px;
            border-radius: 16px;
            box-shadow: 0 0 0 4px rgba(34,197,94,0.4), 0 0 40px 12px rgba(34,197,94,0.35);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, transform 0.2s;
            z-index: 1000;
            white-space: nowrap;
        }
        #door-toast.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        @media (max-width: 380px) {
            :root { --btn-size: 46px; }
            #talkButton, #openDoorButton { font-size: 13px; }
        }

        /* Tablet portrait: slightly wider app column */
        @media (min-width: 640px) and (orientation: portrait) {
            body { display: flex; align-items: center; justify-content: center; background: #050505; }
            #app { max-width: 520px; height: 100dvh; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        }

        /* Landscape / desktop: side-by-side layout */
        @media (min-width: 768px) and (orientation: landscape),
               (min-width: 1024px) {
            body {
                display: flex;
                align-items: center;
                justify-content: center;
                background: #050505;
            }
            #app {
                flex-direction: row;
                width: 100vw;
                max-width: 1280px;
                height: 100dvh;
                border: none;
            }
            #video-wrapper {
                flex: 1;
                height: 100%;
            }
            #controls-bar {
                width: 260px;
                flex-shrink: 0;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                gap: 0;
                padding: 32px 20px calc(32px + var(--safe-bottom));
                border-top: none;
                border-left: 1px solid var(--border);
                overflow-y: auto;
            }
            .btn-row {
                flex-direction: column;
                align-items: center;
                gap: 18px;
            }
            #talkButton, #openDoorButton {
                max-width: 100%;
                width: 100%;
            }
            /* Keep circular icon buttons square — don't let width:100% apply */
            #talkButton.btn-icon,
            .btn-icon {
                width: 78px;
                height: 78px;
                flex-shrink: 0;
            }
            #talkButton.btn-icon svg,
            .btn-icon svg {
                width: 33px;
                height: 33px;
            }
            /* Open door in landscape */
            #door-row { margin-top: 24px; }
            .btn-door {
                width: 117px !important;
                height: 117px !important;
                min-width: 117px;
                min-height: 117px;
                max-width: 117px;
                flex-shrink: 0;
            }
            .btn-door svg { width: 50px; height: 50px; }
    </style>
</head>
<body>
<div id="app">

    <!-- Video fills all available space -->
    <div id="video-wrapper">
        <video id="remoteVideo" autoplay playsinline muted></video>

        <!-- Status pill overlaid top-left -->
        <div id="status-overlay">
            <div id="connection_status"></div>
            <span id="status-text">Connecting…</span>
            <div id="token-debug" style="
				position: absolute;
				bottom: 14px;
				right: 14px;
				background: rgba(0,0,0,0.55);
				backdrop-filter: blur(8px);
				border: 1px solid rgba(255,255,255,0.1);
				border-radius: 8px;
				padding: 6px 10px;
				font-size: 11px;
				color: #aaa;
				font-family: monospace;
				pointer-events: none;
				display: none;
			"></div>
        </div>

        <!-- Waiting / error notice over dark video background -->
        <div id="video-notice">
            <div id="loadingDoorbell">
                <div class="notice-icon">📡</div>
                <div>Connecting to doorbell…</div>
            </div>
            <div id="errorConnectionDoorbell">
                <div class="notice-icon">⚠️</div>
                <div id="error-text">Doorbell not connected.</div>
                <button id="wakeButton">Ring doorbell</button>
            </div>
        </div>

        <!-- Avatars overlay — bottom-left: self first, then others -->
        <div id="avatars-overlay">
            <div id="user-avatar"></div>
            <div id="participants-row"></div>
        </div>

        <!-- Menu overlay — top right -->
        <div id="menu-overlay">
            <button id="menuButton" aria-label="Menu">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div id="menu-dropdown">
                <button id="hangupButton" class="menu-item danger">Disconnect</button>
            </div>
        </div>
    </div>

    <!-- Controls pinned to the bottom -->
    <div id="controls-bar">

        <!-- Primary actions -->
        <div class="btn-row">
            <button id="talkButton" class="btn btn-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>

            <button id="muteButton" class="btn btn-icon" title="Mute mic">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
            </button>
            <button id="speakerButton" class="btn btn-icon" title="Toggle speaker">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
        </div>

        <!-- Open door -->
        <div id="door-row">
            <button id="openDoorButton" class="btn btn-door" title="Open door">
                <svg xmlns="http://www.w3.org/2000/svg" width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4H6a2 2 0 0 0-2 2v14"/><path d="M2 20h8"/><path d="M18 20h2"/><path d="M13 20V4l7 3v13"/><circle cx="17" cy="12" r="1" fill="currentColor" stroke="none"/></svg>
            </button>
        </div>

    </div>
</div>

<div class="controls" style="display:none"></div>
<div id="door-toast">🔓 Door opened</div>

<script src="static/js/socket.io.min.js"></script>
<script src="https://webrtc.github.io/adapter/adapter-latest.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="static/js/janus.js"></script>
<script>
    /* ── Patch updateConnectionStatus to drive the new overlay ── */
    window._statusText = document.getElementById('status-text');
    window._statusDot  = document.getElementById('connection_status');

    window.updateConnectionStatusPatched = function(color, text) {
        window._statusDot.className = '';
        if (color === 'green')  window._statusDot.classList.add('green');
        if (color === 'orange') window._statusDot.classList.add('amber');
        if (color === 'red')    window._statusDot.classList.add('red');
        window._statusText.textContent = text;
    };

    /* ── Patch showDoorbellError to use new layout ── */
    window.showDoorbellErrorPatched = function(msg) {
        document.getElementById('loadingDoorbell').style.display   = 'none';
        const errEl = document.getElementById('errorConnectionDoorbell');
        errEl.style.display = 'flex';
        document.getElementById('error-text').textContent = msg;
    };

    /* ── User avatar ── */
    (function() {
        const _colors = [
            { bg: '#1d4ed8', glow: '#3b82f6' },
            { bg: '#065f46', glow: '#10b981' },
            { bg: '#7c3aed', glow: '#a78bfa' },
            { bg: '#b45309', glow: '#f59e0b' },
            { bg: '#be185d', glow: '#f472b6' },
            { bg: '#0e7490', glow: '#22d3ee' },
            { bg: '#9f1239', glow: '#fb7185' },
            { bg: '#3f6212', glow: '#84cc16' },
        ];
        const _user = new URL(window.location.href).searchParams.get('user') || 'Unknown';
        const _reserved = ['intercom', 'doorbell'];
        const _avatar = document.getElementById('user-avatar');
        if (_reserved.includes(_user.toLowerCase())) {
            _avatar.style.display = 'none';
            window._avatarGlow = null;
            return;
        }
        const _letter = _user.charAt(0).toUpperCase();
        let _hash = 0;
        for (let i = 0; i < _user.length; i++) _hash = (_hash * 31 + _user.charCodeAt(i)) & 0xffffffff;
        const _col = _colors[Math.abs(_hash) % _colors.length];
        _avatar.textContent = _letter;
        _avatar.style.background = _col.bg;
        _avatar.style.color = '#fff';
        window._avatarGlow = _col.glow;
    })();

    /* ── Open door button visibility ── */
    (function() {
        const _params = new URL(window.location.href).searchParams;
        const _token = _params.get('token') || '';
        const _user  = (_params.get('user') || '').toLowerCase();
        const _btn   = document.getElementById('openDoorButton');
        if (!_btn) return;
        if (_user === 'intercom' || _token) {
            _btn.style.display = '';
        } else {
            _btn.style.display = 'none';
        }
    })();

    /* Hide video-notice once video loads */
    document.getElementById('remoteVideo').addEventListener('loadeddata', function() {
        document.getElementById('video-notice').style.display = 'none';
    });

</script>
<script src="static/js/doorbell-client.js"></script>
<script>
    /* Menu toggle */
    const _menuBtn = document.getElementById('menuButton');
    const _menuDrop = document.getElementById('menu-dropdown');
    _menuBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        _menuDrop.classList.toggle('open');
    });
    document.addEventListener('click', function() {
        _menuDrop.classList.remove('open');
    });

    /* Wake doorbell button */
    const _wakeBtn = document.getElementById('wakeButton');
    if (_wakeBtn) {
        _wakeBtn.addEventListener('click', async function() {
            _wakeBtn.disabled = true;
            _wakeBtn.textContent = 'Sending…';
            try {
                const response = await fetch("https://stefe.duckdns.org/doorbell/webhook", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ event: "doorbell" })
                });
                _wakeBtn.textContent = response.ok ? 'Signal sent!' : 'Failed — retry';
            } catch (e) {
                _wakeBtn.textContent = 'Failed — retry';
            } finally {
                setTimeout(() => {
                    _wakeBtn.disabled = false;
                    _wakeBtn.textContent = 'Ring doorbell';
                }, 3000);
            }
        });
    }

    /* Door opened toast */
    window.showDoorToast = function() {
        const toast = document.getElementById('door-toast');
        toast.classList.add('visible');
        setTimeout(() => toast.classList.remove('visible'), 3000);
    };

    /* Wire patched helpers over the originals after doorbell-client loads */
    const _origUpdate = window.updateConnectionStatus;
    window.updateConnectionStatus = function(color, text) {
        _origUpdate && _origUpdate(color, text);
        window.updateConnectionStatusPatched(color, text);
    };

    /* ── Participant avatars ── */
    const _avatarColors = [
        { bg: '#1d4ed8', glow: '#3b82f6' },
        { bg: '#065f46', glow: '#10b981' },
        { bg: '#7c3aed', glow: '#a78bfa' },
        { bg: '#b45309', glow: '#f59e0b' },
        { bg: '#be185d', glow: '#f472b6' },
        { bg: '#0e7490', glow: '#22d3ee' },
        { bg: '#9f1239', glow: '#fb7185' },
        { bg: '#3f6212', glow: '#84cc16' },
    ];

    function _colorForName(name, id) {
        const seed = String(name) + String(id || '');
        let h = 0;
        for (let i = 0; i < seed.length; i++) h = (h * 31 + seed.charCodeAt(i)) & 0xffffffff;
        return _avatarColors[Math.abs(h) % _avatarColors.length];
    }

    const _participants = {}; // id -> { display, color }

    window.addParticipantAvatar = function(id, display) {
        console.log(`[participants] addParticipantAvatar: ${display}(${id}), already exists: ${!!_participants[id]}, reserved: ${['intercom','doorbell'].includes((display||'').toLowerCase())}`);
        if (_participants[id]) return;
        const _reserved = ['intercom', 'doorbell'];
        if (_reserved.includes((display || '').toLowerCase())) return;
        const col = _colorForName(display, id);
        _participants[id] = { display, color: col };
        const el = document.createElement('div');
        el.className = 'participant-avatar';
        el.id = 'participant-' + id;
        el.style.background = col.bg;
        el.title = display;
        el.textContent = display.charAt(0).toUpperCase();
        const label = document.createElement('span');
        label.className = 'participant-name';
        label.textContent = display;
        el.appendChild(label);
        document.getElementById('participants-row').appendChild(el);
    };

    window.removeParticipantAvatar = function(id) {
        const el = document.getElementById('participant-' + id);
        if (el) el.remove();
        delete _participants[id];
    };

    window.setParticipantTalking = function(id, talking) {
        const p = _participants[id];
        const el = document.getElementById('participant-' + id);
        if (!el || !p) return;
        el.style.boxShadow = talking
            ? `0 0 0 3px ${p.color.glow}, 0 0 14px 4px ${p.color.glow}`
            : '';
    };

    /* Avatar glow when speaking */
    const _origTalkBtn = window.updateTalkButton;
    window.updateTalkButton = function(active) {
        _origTalkBtn && _origTalkBtn(active);
        const _av = document.getElementById('user-avatar');
        if (_av) {
            _av.classList.toggle('speaking', active);
            _av.style.boxShadow = active
                ? `0 0 0 3px ${window._avatarGlow}, 0 0 18px 6px ${window._avatarGlow}`
                : '';
        }
    };

    const _origError = window.showDoorbellError;
    window.showDoorbellError = function(msg) {
        window.showDoorbellErrorPatched(msg);
    };
    
   (function() {
		const token = new URL(window.location.href).searchParams.get('token');
		const dbg = document.getElementById('token-debug');
		if (dbg && token) {
			const parts = token.split('.');
			const expiry = parts.length === 2 ? parseInt(parts[1]) : null;
			const remaining = expiry ? Math.max(0, expiry - Math.floor(Date.now() / 1000)) : null;
			dbg.textContent = remaining !== null 
				? `token valid for ${Math.floor(remaining / 60)}m ${remaining % 60}s`
				: `token: ${token}`;
			dbg.style.display = 'block';
		}
	})();
	
	
	// Run on load
	updateDoorButtonState();
	
	// Check every 15 seconds
	setInterval(updateDoorButtonState, 15000);

</script>
</body>
